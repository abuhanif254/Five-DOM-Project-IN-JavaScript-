<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Switcher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
      <div class="container">

           <h1 class="heading">Color Switcher</h1>
         <div class="inputBtnContainer">
            <button class="randomBtn">Random Color</button>
            <input type="text" placeholder="Enter a color or hex (e.g. white or #ffffff)" id="colorInput">
            <button class="applyBtn">Apply Color</button>
            <p class="currentColor">Current Color: <span class="currentColorValue">Green</span></p>
         </div>


      </div>














    <script src="app.js"></script>
</body>
</html>
